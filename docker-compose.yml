services:

  # ── Application ────────────────────────────────────────────────────────────────

  template-nginx:
    container_name: template-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - template-php
    networks:
      - app-network

  template-php:
    container_name: template-php
    build:
      context: .
      dockerfile: Dockerfile.php.dev
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "
        php artisan migrate --force --database=pgsql_direct &&
        php artisan queue:work --queue=default,payments,analytics --sleep=3 --tries=3 &
        php artisan reverb:start --host=0.0.0.0 --port=6001 &
        exec php-fpm
      "
    ports:
      - "9000:9000"
      - "6001:6001"
    volumes:
      - ./:/var/www
    env_file:
      - .env.docker
    depends_on:
      template-pgbouncer:
        condition: service_started
      template-redis:
        condition: service_healthy
      template-rabbitmq:
        condition: service_healthy
      template-rustfs:
        condition: service_healthy
    networks:
      - app-network

  # ── Database ───────────────────────────────────────────────────────────────────

  template-postgres:
    container_name: template-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE:-laravel}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer — connection pooler para PostgreSQL
  # POOL_MODE=transaction: compatível com o driver pgsql (PDO::ATTR_EMULATE_PREPARES=true)
  # Migrations usam a conexão pgsql_direct (direta ao Postgres) para evitar conflito com advisory locks
  template-pgbouncer:
    container_name: template-pgbouncer
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD:-secret}@template-postgres:5432/${DB_DATABASE:-laravel}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 50
    ports:
      - "6432:5432"
    depends_on:
      template-postgres:
        condition: service_healthy
    networks:
      - app-network

  # ── Cache / Queue ──────────────────────────────────────────────────────────────

  template-redis:
    container_name: template-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-}"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  template-rabbitmq:
    container_name: template-rabbitmq
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Analytics ──────────────────────────────────────────────────────────────────

  template-clickhouse:
    container_name: template-clickhouse
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ports:
      - "8123:8123"     # HTTP API (usado pela aplicação)
      - "9090:9000"     # Native protocol
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Object Storage ─────────────────────────────────────────────────────────────
  # RustFS — armazenamento de objetos compatível com S3, licença Apache 2.0
  # Substitui MinIO (AGPL v3) para evitar restrições de licença em uso comercial
  # Console: http://localhost:9101
  # S3 API:  http://localhost:9100
  # Credenciais: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY do .env
  template-rustfs:
    container_name: template-rustfs
    image: rustfs/rustfs:latest
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    user: "10001:10001"
    ports:
      - "9100:9000"     # S3 API (host 9100 → container 9000)
      - "9101:9001"     # Console web
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${AWS_ACCESS_KEY_ID:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      # Modo single-node (dev/staging): ignora checagem de topologia de disco
      # Em produção, use múltiplos volumes e remova esta variável
      - RUSTFS_UNSAFE_BYPASS_DISK_CHECK=true
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  clickhouse-data:
  rustfs-data:
  rustfs-logs:

