name: CI Laravel

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit & Feature Tests
    runs-on: ubuntu-latest

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: PHP Setup
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, sqlite3, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        env:
          COMPOSER_NO_AUDIT: "1"

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run Unit Tests
        run: php artisan test --testsuite=Unit

      - name: Run Feature Tests (validation rules, no DB)
        run: php artisan test --testsuite=Feature --exclude-group=requires-db

  analyse:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: PHP Setup
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        env:
          COMPOSER_NO_AUDIT: "1"

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Count files for analysis
        run: |
          FILE_COUNT=$(find app -name "*.php" | wc -l)
          echo "PHP files in app/ for analysis: $FILE_COUNT"

      - name: Run PHPStan
        run: composer analyse
